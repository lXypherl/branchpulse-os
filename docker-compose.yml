services:
  db:
    image: postgres:16-alpine
    container_name: xyloquent-branch-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xyloquent_branch}
      POSTGRES_USER: ${POSTGRES_USER:-xyloquent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xyloquent}
    ports:
      - "${DB_PORT:-5499}:5432"
    volumes:
      - xyloquent_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xyloquent"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xyloquent-branch-app
    restart: unless-stopped
    ports:
      - "3088:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-xyloquent}:${POSTGRES_PASSWORD:-xyloquent}@db:5432/${POSTGRES_DB:-xyloquent_branch}?schema=public
      NODE_ENV: production
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:1.5b}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy

  # One-time seed runner
  seed:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xyloquent-branch-seed
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-xyloquent}:${POSTGRES_PASSWORD:-xyloquent}@db:5432/${POSTGRES_DB:-xyloquent_branch}?schema=public
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma db push --skip-generate && npx tsx prisma/seed.ts"
    profiles:
      - seed

volumes:
  xyloquent_data:
