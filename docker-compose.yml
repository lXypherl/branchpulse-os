services:
  db:
    image: postgres:16-alpine
    container_name: branchpulse-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: branchpulse
      POSTGRES_USER: branchpulse
      POSTGRES_PASSWORD: branchpulse
    ports:
      - "5499:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U branchpulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: branchpulse-app
    restart: unless-stopped
    ports:
      - "3088:3000"
    environment:
      DATABASE_URL: postgresql://branchpulse:branchpulse@db:5432/branchpulse?schema=public
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

  # One-time seed runner
  seed:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: branchpulse-seed
    environment:
      DATABASE_URL: postgresql://branchpulse:branchpulse@db:5432/branchpulse?schema=public
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma db push --skip-generate && npx tsx prisma/seed.ts"
    profiles:
      - seed

volumes:
  postgres_data:
